<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BITCH</title>
    <link rel="preload" as="image" href="/src/lib/assets/bitch-logo.png" />
    <style>
      :root {
        color-scheme: dark;
        background: #000;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      #bitch-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #000;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 420ms ease,
          visibility 420ms ease;
      }

      .bitch-splash-logo-stack {
        position: relative;
        width: min(34vw, 10rem);
        aspect-ratio: 1;
      }

      .bitch-splash-logo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border-radius: 1rem;
        animation: bitch-splash-jitter 2.4s steps(1, end) infinite;
      }

      .bitch-splash-logo--cyan,
      .bitch-splash-logo--magenta {
        opacity: 0;
        mix-blend-mode: screen;
      }

      .bitch-splash-logo--cyan {
        filter: brightness(0) saturate(100%) invert(85%) sepia(52%) saturate(970%) hue-rotate(162deg) brightness(105%)
          contrast(99%);
        animation: bitch-splash-glitch-cyan 2.4s steps(1, end) infinite;
      }

      .bitch-splash-logo--magenta {
        filter: brightness(0) saturate(100%) invert(56%) sepia(95%) saturate(1292%) hue-rotate(287deg) brightness(104%)
          contrast(101%);
        animation: bitch-splash-glitch-magenta 2.4s steps(1, end) infinite;
      }

      .bitch-app-ready #bitch-splash {
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
      }

      @keyframes bitch-splash-jitter {
        0%,
        82%,
        100% {
          transform: translate(0, 0);
        }
        84% {
          transform: translate(-1px, 1px);
        }
        86% {
          transform: translate(1px, -1px);
        }
        88% {
          transform: translate(0, 0);
        }
      }

      @keyframes bitch-splash-glitch-cyan {
        0%,
        80%,
        100% {
          clip-path: inset(0 0 0 0);
          opacity: 0;
          transform: translate(0, 0);
        }
        82% {
          clip-path: inset(12% 0 62% 0);
          opacity: 0.55;
          transform: translate(-5px, -1px);
        }
        84% {
          clip-path: inset(48% 0 29% 0);
          opacity: 0.5;
          transform: translate(4px, 1px);
        }
        86% {
          clip-path: inset(72% 0 11% 0);
          opacity: 0.4;
          transform: translate(-3px, 0);
        }
      }

      @keyframes bitch-splash-glitch-magenta {
        0%,
        78%,
        100% {
          clip-path: inset(0 0 0 0);
          opacity: 0;
          transform: translate(0, 0);
        }
        81% {
          clip-path: inset(64% 0 18% 0);
          opacity: 0.42;
          transform: translate(5px, 1px);
        }
        85% {
          clip-path: inset(24% 0 52% 0);
          opacity: 0.5;
          transform: translate(-4px, -1px);
        }
        87% {
          clip-path: inset(42% 0 41% 0);
          opacity: 0.35;
          transform: translate(3px, 0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #bitch-splash,
        .bitch-splash-logo {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="bitch-splash" role="status" aria-label="Loading BITCH">
      <div class="bitch-splash-logo-stack" aria-hidden="true">
        <img class="bitch-splash-logo" src="/src/lib/assets/bitch-logo.png" alt="" />
        <img class="bitch-splash-logo bitch-splash-logo--cyan" src="/src/lib/assets/bitch-logo.png" alt="" />
        <img class="bitch-splash-logo bitch-splash-logo--magenta" src="/src/lib/assets/bitch-logo.png" alt="" />
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
