<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BITCH</title>
    <style>
      :root {
        --bits-canvas: #000000;
        --bits-primary: #8be9fd;
        --bits-warning: #ff79c6;
        color-scheme: dark;
        background: var(--bits-canvas);
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--bits-canvas);
      }

      #bitch-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--bits-canvas);
        opacity: 1;
        visibility: visible;
        transition:
          opacity 420ms ease,
          visibility 420ms ease;
      }

      @media (prefers-reduced-motion: reduce) {
        #bitch-splash {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="bitch-splash" role="status" aria-label="Loading BITCH"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
